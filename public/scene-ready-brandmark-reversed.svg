<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <!-- 
    Scene Ready — Reversed Brand Mark (for dark backgrounds)
    Use on: Navy, black, or dark photo backgrounds
    
    Colors:
      White replaces Navy on chevron and wordmark
      Red stays #C8102E
  -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&amp;display=swap');
    </style>
  </defs>

  <!-- Chevron Pair Icon — Reversed -->
  <g transform="translate(68, 58)">
    <!-- Upper Chevron — White -->
    <path d="M 0 -48 L 36 -12 L 36 6 L 0 -30 L -36 6 L -36 -12 Z" fill="#FFFFFF"/>
    <!-- Lower Chevron — Red -->
    <path d="M 0 -16 L 36 20 L 36 38 L 0 2 L -36 38 L -36 20 Z" fill="#C8102E"/>
  </g>

  <!-- Wordmark — White -->
  <text x="122" y="52" font-family="'Barlow', system-ui, sans-serif" font-weight="700" font-size="36" fill="#FFFFFF" letter-spacing="5">SCENE READY</text>

  <!-- Divider — Red -->
  <line x1="122" y1="64" x2="270" y2="64" stroke="#C8102E" stroke-width="1.5"/>

  <!-- Tagline — Muted light -->
  <text x="122" y="82" font-family="'Barlow', system-ui, sans-serif" font-weight="400" font-size="11" fill="rgba(255,255,255,0.5)" letter-spacing="3">PREPARED TO PERFORM</text>
</svg>
